# Drag  windows by holding down $mod and left mouse button. Resize them with right mouse button + $mod.
floating_modifier $mod normal

# allow to kill focused floating shell windows using Esc
$bindsym --release Escape [app_id="floating_shell" con_id=__focused__] kill

# Move focus // $mod + ↑ ↓ ← →
$bindsym $mod+$left_alt focus left
$bindsym $mod+$down_alt focus down
$bindsym $mod+$up_alt focus up
$bindsym $mod+$right_alt focus right

# Move focused window // $mod + Shift + ↑ ↓ ← →
$bindsym $mod+Shift+$left move left
$bindsym $mod+Shift+$down move down
$bindsym $mod+Shift+$up move up
$bindsym $mod+Shift+$right move right

$bindsym $mod+Shift+$left_alt move left
$bindsym $mod+Shift+$down_alt move down
$bindsym $mod+Shift+$up_alt move up
$bindsym $mod+Shift+$right_alt move right

# Move focused workspace // $mod + Alt + ↑ ↓ ← →
$bindsym $mod+Alt+$right move workspace to output right
$bindsym $mod+Alt+$left move workspace to output left
$bindsym $mod+Alt+$down move workspace to output down
$bindsym $mod+Alt+$up move workspace to output up

$bindsym $mod+Alt+$right_alt move workspace to output right
$bindsym $mod+Alt+$left_alt move workspace to output left
$bindsym $mod+Alt+$down_alt move workspace to output down
$bindsym $mod+Alt+$up_alt move workspace to output up

# Resize your windows
$bindsym $mod+$up resize grow width 10 px or 10 ppt
$bindsym $mod+$down resize shrink width 10 px or 10 ppt

# Scale
$bindsym $alt_mod+plus exec $scale_up
$bindsym $alt_mod+Shift+minus exec $scale_down

# Move between workspaces
$bindsym $mod+$left workspace prev
$bindsym $mod+$right workspace next
$bindsym $mod+Tab workspace back_and_forth

# Switch workspace // $mod + [number]
$bindsym $mod+1 workspace $ws1
$bindsym $mod+2 workspace $ws2
$bindsym $mod+3 workspace $ws3
$bindsym $mod+4 workspace $ws4
$bindsym $mod+5 workspace $ws5
$bindsym $mod+6 workspace $ws6
$bindsym $mod+7 workspace $ws7
$bindsym $mod+8 workspace $ws8
$bindsym $mod+9 workspace $ws9
$bindsym $mod+0 workspace $ws10

set $focus_ws [ "$focus_after_move" == 'true' ] && swaymsg workspace

## Move focused window to workspace // $mod + Shift + [number]
$bindsym $mod+Shift+1 move container to workspace $ws1, exec $focus_ws $ws1
$bindsym $mod+Shift+2 move container to workspace $ws2, exec $focus_ws $ws2
$bindsym $mod+Shift+3 move container to workspace $ws3, exec $focus_ws $ws3
$bindsym $mod+Shift+4 move container to workspace $ws4, exec $focus_ws $ws4
$bindsym $mod+Shift+5 move container to workspace $ws5, exec $focus_ws $ws5
$bindsym $mod+Shift+6 move container to workspace $ws6, exec $focus_ws $ws6
$bindsym $mod+Shift+7 move container to workspace $ws7, exec $focus_ws $ws7
$bindsym $mod+Shift+8 move container to workspace $ws8, exec $focus_ws $ws8
$bindsym $mod+Shift+9 move container to workspace $ws9, exec $focus_ws $ws9
$bindsym $mod+Shift+0 move container to workspace $ws10, exec $focus_ws $ws10

# Launchers
$bindsym $mod+return exec $term_cwd
$bindsym $mod+shift+return exec $term_float
$bindsym F12 exec $term_float

$bindsym $mod+bracketleft exec "$HOME/.config/sway/scripts/focus_or_launch.sh $term foot"
$bindsym $mod+bracketright exec "$HOME/.config/sway/scripts/focus_or_launch.sh $browser $browser_id"
bindcode $mod+47 exec $camera # semi-colon

$bindsym $mod+question exec $float_keys
$bindsym $mod+space exec $menu
$bindsym $mod+period exec "rofi -show emoji"
$bindsym $alt_mod+Tab exec "rofi -show window"

$bindsym $mod+a exec "rofi -show window"
$bindsym $mod+b exec pkill -SIGUSR1 waybar
$bindsym $mod+c exec $color_picker
$bindsym $mod+d exec $HOME/.config/sway/scripts/first-empty-workspace.py --switch, exec $menu
$bindsym $mod+shift+c exec $edit_config
$bindsym $mod+q kill
$bindsym $mod+shift+r reload
$bindsym $mod+v exec $clipboard

$bindsym $mod+m exec ~/.config/sway/scripts/rofi-move-to-workspace.sh
$bindsym $mod+shift+m exec $HOME/.config/sway/scripts/first-empty-workspace.py --move --switch
$bindsym $mod+n exec $HOME/.config/sway/scripts/first-empty-workspace.py --switch
$bindsym $mod+shift+n exec $HOME/.config/sway/scripts/first-empty-workspace.py --move

# Layout
$bindsym $mod+e splith
$bindsym $mod+shift+e splitv
$bindsym $mod+f fullscreen
$bindsym $mod+shift+f floating toggle
$bindsym $mod+p focus parent
$bindsym $mod+shift+p focus mode_toggle
$bindsym $mod+t layout tabbed
$bindsym $mod+shift+t layout stacking
$bindsym $mod+s layout toggle all
$bindsym F11 fullscreen

# Media, --locked flags allow the buttons to be used whilst the screen is locked.
$bindsym --locked XF86AudioRaiseVolume exec $volume_up
$bindsym --locked XF86AudioLowerVolume exec $volume_down
$bindsym --locked XF86AudioMute exec $volume_mute
$bindsym XF86AudioMicMute exec $mic_mute
$bindsym --locked XF86MonBrightnessUp exec $brightness_up
$bindsym --locked XF86MonBrightnessDown exec $brightness_down
$bindsym --locked XF86AudioPlay exec playerctl play-pause
$bindsym XF86AudioNext exec playerctl next
$bindsym XF86AudioPrev exec playerctl previous
$bindsym XF86Search exec $menu
$bindsym XF86PowerOff exec $shutdown
$bindsym XF86TouchpadToggle input type:touchpad events toggle enabled disabled

