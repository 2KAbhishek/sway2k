### Output configuration

# You can get the names of your outputs by running: swaymsg -t get_outputs
# Manually Enable/Diable outputs: swaymsg output eDP-1 disable
# see man 5 sway-output for more
# Use wdisplay to quickly adjust layout, you can copy the layout from there

# Default wallpaper
output * bg $background fill

# Main screens
output HDMI-A-1 resolution 3840x2160 position 1920,0
output eDP-1 resolution 1920x1080 position 2910,2160 scale 1

